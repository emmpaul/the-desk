services:
    laravel.test:
        build:
            context: './vendor/laravel/sail/runtimes/8.5'
            dockerfile: Dockerfile
            args:
                WWWGROUP: '${WWWGROUP}'
        image: 'sail-8.5/app'
        extra_hosts:
            - 'host.docker.internal:host-gateway'
        ports:
            - '${APP_PORT:-80}:80'
            - '${VITE_PORT:-5173}:${VITE_PORT:-5173}'
        environment:
            WWWUSER: '${WWWUSER}'
            LARAVEL_SAIL: 1
            XDEBUG_MODE: '${SAIL_XDEBUG_MODE:-off}'
            XDEBUG_CONFIG: '${SAIL_XDEBUG_CONFIG:-client_host=host.docker.internal}'
            IGNITION_LOCAL_SITES_PATH: '${PWD}'
        volumes:
            - '.:/var/www/html'
        networks:
            - sail
        depends_on:
            - pgsql
            - redis
            - meilisearch
            - mailpit
            - reverb
            - queue
    reverb:
        image: 'sail-8.5/app'
        extra_hosts:
            - 'host.docker.internal:host-gateway'
        command: ['php', 'artisan', 'reverb:start', '--host=0.0.0.0', '--port=8080']
        ports:
            - '${REVERB_PORT:-8080}:8080'
        environment:
            WWWUSER: '${WWWUSER}'
            LARAVEL_SAIL: 1
        volumes:
            - '.:/var/www/html'
        networks:
            - sail
        depends_on:
            - pgsql
            - redis
    queue:
        image: 'sail-8.5/app'
        extra_hosts:
            - 'host.docker.internal:host-gateway'
        # Broadcasts lead the queue list and the worker never sleeps between
        # polls, matching the production topology's latency (see
        # docker-compose.prod.yml). It stays a single `queue:listen` container:
        # respawning per job is what picks up code edits without a restart, and
        # its bootstrap is invisible next to the 3 seconds this replaces (#763).
        command: ['php', 'artisan', 'queue:listen', '--queue=broadcasts,default', '--sleep=0', '--tries=1', '--timeout=0']
        environment:
            WWWUSER: '${WWWUSER}'
            LARAVEL_SAIL: 1
        volumes:
            - '.:/var/www/html'
        networks:
            - sail
        depends_on:
            - pgsql
            - redis
            - reverb
    cron:
        image: 'sail-8.5/app'
        extra_hosts:
            - 'host.docker.internal:host-gateway'
        command: [ 'php', 'artisan', 'schedule:work' ]
        environment:
            WWWUSER: '${WWWUSER}'
            LARAVEL_SAIL: 1
        volumes:
            - '.:/var/www/html'
        networks:
            - sail
        depends_on:
            - pgsql
            - redis
            - reverb
    pgsql:
        image: 'postgres:18-alpine'
        ports:
            - '${FORWARD_DB_PORT:-5432}:5432'
        environment:
            PGPASSWORD: '${DB_PASSWORD:-secret}'
            POSTGRES_DB: '${DB_DATABASE}'
            POSTGRES_USER: '${DB_USERNAME}'
            POSTGRES_PASSWORD: '${DB_PASSWORD:-secret}'
        volumes:
            - 'sail-pgsql:/var/lib/postgresql'
            - './vendor/laravel/sail/database/pgsql/create-testing-database.sql:/docker-entrypoint-initdb.d/10-create-testing-database.sql'
        networks:
            - sail
        healthcheck:
            test:
                - CMD
                - pg_isready
                - '-q'
                - '-d'
                - '${DB_DATABASE}'
                - '-U'
                - '${DB_USERNAME}'
            retries: 3
            timeout: 5s
    redis:
        image: 'redis:alpine'
        ports:
            - '${FORWARD_REDIS_PORT:-6379}:6379'
        volumes:
            - 'sail-redis:/data'
        networks:
            - sail
        healthcheck:
            test:
                - CMD
                - redis-cli
                - ping
            retries: 3
            timeout: 5s
    meilisearch:
        image: 'getmeili/meilisearch:latest'
        ports:
            - '${FORWARD_MEILISEARCH_PORT:-7700}:7700'
        environment:
            MEILI_NO_ANALYTICS: '${MEILISEARCH_NO_ANALYTICS:-false}'
        volumes:
            - 'sail-meilisearch:/meili_data'
        networks:
            - sail
        healthcheck:
            test:
                - CMD
                - wget
                - '--no-verbose'
                - '--spider'
                - 'http://127.0.0.1:7700/health'
            retries: 3
            timeout: 5s
    mailpit:
        image: 'axllent/mailpit:latest'
        ports:
            - '${FORWARD_MAILPIT_PORT:-1025}:1025'
            - '${FORWARD_MAILPIT_DASHBOARD_PORT:-8025}:8025'
        networks:
            - sail
    # Opt-in identity providers for exercising the SSO flows locally (#356/#357).
    # Guarded by the `sso` compose profile so a default `sail up` never starts
    # them: enable with COMPOSE_PROFILES=sso in .env, or `sail up --profile sso`.
    ldap:
        image: 'osixia/openldap:1.5.0'
        profiles:
            - sso
        command:
            - '--copy-service'
        environment:
            LDAP_ORGANISATION: 'The Desk'
            LDAP_DOMAIN: 'the-desk.local'
            LDAP_ADMIN_PASSWORD: '${LDAP_ADMIN_PASSWORD:-adminpassword}'
        ports:
            - '${FORWARD_LDAP_PORT:-389}:389'
        volumes:
            - 'sail-ldap:/var/lib/ldap'
            - 'sail-ldap-config:/etc/ldap/slapd.d'
            - './docker/ldap/bootstrap.ldif:/container/service/slapd/assets/config/bootstrap/ldif/custom/50-the-desk.ldif'
        networks:
            - sail
    # Mock OpenID Connect provider (soluto/oidc-server-mock): config-driven, no
    # DB, serves a real discovery document. Reached as `oidc:8081` from BOTH the
    # browser and the app container so the derived issuer stays consistent — add
    # `127.0.0.1 oidc` to your host's /etc/hosts once (see .env.example). If you
    # change FORWARD_OIDC_PORT, keep SSO_OIDC_ISSUER and /etc/hosts in step.
    oidc:
        image: 'ghcr.io/soluto/oidc-server-mock:0.8.6'
        # Pinned + amd64: the `latest` tag fails to boot on arm64 (assembly load
        # error) and floats the underlying IdentityServer build; this tag is a
        # known-good .NET image that runs under emulation on Apple Silicon.
        platform: 'linux/amd64'
        profiles:
            - sso
        environment:
            ASPNETCORE_ENVIRONMENT: 'Development'
            ASPNETCORE_URLS: 'http://+:8081'
            SERVER_OPTIONS_INLINE: |
                {
                    "AccessTokenJwtType": "JWT",
                    "Discovery": { "ShowKeySet": true },
                    "Authentication": {
                        "CookieSameSiteMode": "Lax",
                        "CheckSessionCookieSameSiteMode": "Lax"
                    }
                }
            LOGIN_OPTIONS_INLINE: |
                { "AllowRememberLogin": false }
            CLIENTS_CONFIGURATION_INLINE: |
                [
                    {
                        "ClientId": "the-desk-dev",
                        "ClientSecrets": ["the-desk-dev-secret"],
                        "Description": "The Desk local dev",
                        "AllowedGrantTypes": ["authorization_code"],
                        "RequirePkce": false,
                        "RequireClientSecret": true,
                        "AllowedScopes": ["openid", "profile", "email"],
                        "RedirectUris": ["http://localhost/auth/oidc/callback"],
                        "IdentityTokenLifetime": 3600,
                        "AccessTokenLifetime": 3600
                    }
                ]
            USERS_CONFIGURATION_INLINE: |
                [
                    {
                        "SubjectId": "oidc1",
                        "Username": "oidc1@the-desk.local",
                        "Password": "password",
                        "Claims": [
                            { "Type": "name", "Value": "OIDC User One", "ValueType": "string" },
                            { "Type": "email", "Value": "oidc1@the-desk.local", "ValueType": "string" },
                            { "Type": "email_verified", "Value": "true", "ValueType": "boolean" }
                        ]
                    },
                    {
                        "SubjectId": "oidc2",
                        "Username": "oidc2@the-desk.local",
                        "Password": "password",
                        "Claims": [
                            { "Type": "name", "Value": "OIDC User Two", "ValueType": "string" },
                            { "Type": "email", "Value": "oidc2@the-desk.local", "ValueType": "string" },
                            { "Type": "email_verified", "Value": "true", "ValueType": "boolean" }
                        ]
                    },
                    {
                        "SubjectId": "oidc3",
                        "Username": "oidc3@the-desk.local",
                        "Password": "password",
                        "Claims": [
                            { "Type": "name", "Value": "OIDC User Three", "ValueType": "string" },
                            { "Type": "email", "Value": "oidc3@the-desk.local", "ValueType": "string" },
                            { "Type": "email_verified", "Value": "true", "ValueType": "boolean" }
                        ]
                    },
                    {
                        "SubjectId": "oidc4",
                        "Username": "oidc4@the-desk.local",
                        "Password": "password",
                        "Claims": [
                            { "Type": "name", "Value": "OIDC User Four", "ValueType": "string" },
                            { "Type": "email", "Value": "oidc4@the-desk.local", "ValueType": "string" },
                            { "Type": "email_verified", "Value": "true", "ValueType": "boolean" }
                        ]
                    }
                ]
        ports:
            - '${FORWARD_OIDC_PORT:-8081}:8081'
        networks:
            - sail
networks:
    sail:
        driver: bridge
volumes:
    sail-pgsql:
        driver: local
    sail-redis:
        driver: local
    sail-meilisearch:
        driver: local
    sail-ldap:
        driver: local
    sail-ldap-config:
        driver: local
