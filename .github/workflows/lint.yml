name: linter

on:
  push:
    branches:
      - develop
      - master
    # Merging a release PR pushes a commit touching only files release-please
    # owns, which cannot affect the app. Push runs carry no required checks, so
    # a plain `paths-ignore` is safe here (unlike on `pull_request`, see the
    # job-level skip below). Guarded by
    # tests/Unit/ReleasePullRequestCiSkipTest.php (#820).
    paths-ignore:
      - 'VERSION'
      - 'CHANGELOG.md'
      - '.release-please-manifest*.json'
  pull_request:
    branches:
      - develop
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    # Release-please PRs only touch VERSION/manifest/changelog files, so this
    # suite has nothing to check there. A job-level `if` (not a `paths` filter)
    # keeps the PR mergeable: a skipped job reports its required check as
    # *skipped*, which GitHub treats as satisfied, while a workflow that never
    # starts leaves it stuck on *Expected*. The head-repo clause keeps the
    # branch name from becoming a CI bypass: `head_ref` is attacker-controlled,
    # so a fork branch named `release-please--anything` must still run
    # everything. Guarded by tests/Unit/ReleasePullRequestCiSkipTest.php (#820).
    if: github.event_name != 'pull_request' || !startsWith(github.head_ref, 'release-please--') || github.event.pull_request.head.repo.full_name != github.repository
    runs-on: ${{ vars.CI_RUNNER || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: '8.5'
          extensions: gd, imagick

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install PHP Dependencies
        uses: ramsey/composer-install@65e4f84970763564f46a70b8a54b90d033b3bdda # v4.0.0
        with:
          composer-options: '--no-scripts'

      # `npm ci` (not `npm install`) so a lockfile that disagrees with
      # package.json fails here instead of silently passing and only breaking
      # the Docker image build minutes later (see #608).
      - name: Install Node Dependencies
        run: npm ci

      - name: Prepare Environment
        run: cp .env.example .env

      - name: Generate Application Key
        run: php artisan key:generate

      - name: Check Release Version References
        run: php artisan release:check-version-refs

      # `resources/js/actions` and `resources/js/routes` are git-ignored Wayfinder
      # output, normally produced as a side effect of `npm run build` — which this
      # job does not run. Without them, eslint cannot resolve `@/actions/*` and
      # `@/routes/*`, and `import/order` mis-groups those imports against `@/types`,
      # failing on sources that are clean locally. `--with-form` matches the
      # `formVariants` option vite.config.ts passes the plugin (see #414).
      - name: Generate Wayfinder Routes
        run: php artisan wayfinder:generate --with-form

      - name: Run Pint
        run: composer lint

      - name: Run Rector
        run: composer refactor:check

      - name: Format Frontend
        run: npm run format:check

      - name: Lint Frontend
        run: npm run lint:check
