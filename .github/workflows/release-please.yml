name: release-please

# Two release lines run from this one file. `master` cuts stable releases;
# `develop` cuts `-rc` candidates ahead of them. Keeping both in a single
# workflow — rather than a per-branch copy — is deliberate: the file is identical
# on both branches, so merging `develop` into `master` cannot change how `master`
# releases. Which line runs is decided by the branch that was pushed, not by
# which version of the file happens to be checked out.
on:
  push:
    branches:
      - master
      - develop

# Serialize release runs per branch but never cancel an in-flight one —
# cancelling release-please mid-run could leave a release PR or tag half-created.
# The two lines are independent, so they are keyed per ref rather than sharing
# one queue.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

# Every API call below is made with RELEASE_PLEASE_TOKEN, so GITHUB_TOKEN needs no
# scopes at all. Don't grant any back: the PAT's scopes are what this workflow
# runs on, and an ambient write-capable GITHUB_TOKEN would only widen the blast
# radius of a compromised action.
permissions: {}

jobs:
  release-please:
    name: Release from master
    if: github.ref == 'refs/heads/master'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      version: ${{ steps.release.outputs.version }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      # Use a PAT (not the built-in GITHUB_TOKEN) so the `v*` tag release-please
      # pushes triggers downstream workflows — notably docker.yml's GHCR publish.
      # GitHub deliberately suppresses `on: push` triggers for refs created by
      # GITHUB_TOKEN, so with the default token a release would tag but never
      # publish the versioned image. RELEASE_PLEASE_TOKEN itself needs the
      # `contents: write` and `pull-requests: write` PAT scopes — those are the
      # token's own scopes, unrelated to the `permissions:` block above.
      #
      # No `target-branch` here on purpose: this job releases the branch it was
      # pushed from, and the `if` above is what pins that to master. Naming the
      # branch as well would keep working silently if the default branch were
      # ever renamed, releasing a branch that no longer exists.
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: release
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  prerelease:
    name: Cut a release candidate from develop
    if: github.ref == 'refs/heads/develop'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      # The candidate line reads its own config *and* its own manifest, both of
      # which release-please resolves from `target-branch`. That separation is
      # what keeps the `prerelease` flag off master: the stable config is a
      # different file, not a different revision of the same file, so a merge in
      # either direction carries both configs across intact.
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          target-branch: develop
          config-file: release-please-config.develop.json
          manifest-file: .release-please-manifest.develop.json

  # A candidate release pull request may only ever move the baseline forwards.
  # release-please decides what to propose from the release it can reach walking
  # `develop`, so a baseline naming a version whose tag was cut on `master` — the
  # window between the baseline sync and the back-merge — leaves it unable to find
  # any release at all, and it falls back to its initial 1.0.0 with the whole
  # history as release notes. That happened at 1.12.2 (#637): the proposal is a
  # *downgrade*, and merging it would tag `v1.0.0`, publish a GitHub release and
  # let a GHCR image claim the moving `latest` aliases ahead of every real
  # version.
  #
  # The sync below now waits for the back-merge, so the window is closed. This is
  # the belt to that braces: it refuses to leave such a proposal open regardless
  # of *why* release-please made it, and it reads the branch rather than the
  # action's outputs so a proposal left over from an earlier run — which is how
  # #636 outlived the topology that produced it — is caught on the next push too.
  candidate-guard:
    name: Refuse a candidate below the baseline
    needs: prerelease
    if: github.ref == 'refs/heads/develop'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - name: Refuse a candidate that does not move the baseline forwards
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          manifest=".release-please-manifest.develop.json"
          branch="release-please--branches--develop"

          number="$(gh pr list --repo "$REPO" --base develop --head "$branch" --state open --json number --jq '.[0].number // empty')"

          if [ -z "$number" ]; then
            echo "No candidate release pull request is open; there is nothing to check."
            exit 0
          fi

          # The manifest is read off each ref rather than from a checkout: the
          # proposal only exists on release-please's branch, and develop keeps
          # moving while this runs.
          baseline_on() {
            gh api "repos/$REPO/contents/$manifest?ref=$1" -H 'Accept: application/vnd.github.raw' \
              | sed -n 's/.*"\."[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p'
          }

          is_version() {
            printf '%s' "$1" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$'
          }

          is_numeric() {
            printf '%s' "$1" | grep -Eq '^[0-9]+$'
          }

          # SemVer precedence over the dot-separated identifiers of two prerelease
          # strings: numeric ones compare as numbers and rank below alphanumeric
          # ones, and a longer identifier list wins when the shorter is a prefix.
          # Succeeds when the first ranks strictly higher.
          prerelease_gt() {
            local field=1 left right

            while true; do
              left="$(printf '%s' "$1" | cut -d. -f"$field")"
              right="$(printf '%s' "$2" | cut -d. -f"$field")"

              if [ -z "$left" ]; then
                return 1
              fi

              if [ -z "$right" ]; then
                return 0
              fi

              if [ "$left" != "$right" ]; then
                if is_numeric "$left" && is_numeric "$right"; then
                  [ "$left" -gt "$right" ]
                  return
                fi

                if is_numeric "$left"; then
                  return 1
                fi

                if is_numeric "$right"; then
                  return 0
                fi

                [ "$left" \> "$right" ]
                return
              fi

              field=$((field + 1))
            done
          }

          # Succeeds when the first version ranks strictly higher than the second.
          # A string comparison would not do: `1.12.2-rc.0` reads as the larger of
          # the pair against `1.12.2`, and it is the exact shape a stale candidate
          # takes once its version has been released.
          version_gt() {
            local left_core="${1%%-*}" right_core="${2%%-*}"
            local left_pre="" right_pre=""
            local field left right

            case "$1" in *-*) left_pre="${1#*-}" ;; esac
            case "$2" in *-*) right_pre="${2#*-}" ;; esac

            for field in 1 2 3; do
              left="$(printf '%s' "$left_core" | cut -d. -f"$field")"
              right="$(printf '%s' "$right_core" | cut -d. -f"$field")"

              if [ "$left" -ne "$right" ]; then
                [ "$left" -gt "$right" ]
                return
              fi
            done

            # Same core version: a release outranks any candidate for it.
            if [ -z "$left_pre" ]; then
              [ -n "$right_pre" ]
              return
            fi

            if [ -z "$right_pre" ]; then
              return 1
            fi

            prerelease_gt "$left_pre" "$right_pre"
          }

          proposed="$(baseline_on "$branch")"
          current="$(baseline_on develop)"

          # An unreadable version is not evidence that the proposal is safe.
          if ! is_version "$proposed" || ! is_version "$current"; then
            echo "::error::Could not compare the candidate: read '$proposed' from $branch and '$current' from develop." >&2
            exit 1
          fi

          if version_gt "$proposed" "$current"; then
            echo "Candidate $proposed is ahead of the baseline $current."
            exit 0
          fi

          gh pr close "$number" --repo "$REPO" --delete-branch \
            --comment "Closed automatically: $proposed does not move develop's candidate baseline ($current) forwards, so merging it would tag a version below the one already released. See #637."

          echo "::error::Candidate release PR #$number proposes $proposed, which is not ahead of develop's baseline $current; it has been closed." >&2
          exit 1

  # The candidate manifest is a separate file, so nothing in a stable release
  # tells `develop` that the version it was building candidates for has shipped.
  # Left alone it would keep incrementing `1.12.0-rc.N` forever, long after
  # 1.12.0 was released. This job closes that loop: once master cuts a stable
  # release, develop's baseline is moved to it, so the next feature there starts
  # a fresh `1.13.0-rc.0` series.
  sync-candidate-baseline:
    name: Move the candidate baseline to the released version
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      # A stable release must not be reported as failed just because there is no
      # candidate line to update — `develop` is created separately from this
      # workflow, and until it exists (or if it is ever retired) there is simply
      # nothing to sync.
      #
      # Listing the branches rather than probing `branches/develop` directly is
      # deliberate: a direct probe answers 404 both when the branch is absent and
      # when the call was refused, so a token or API problem would read as "no
      # develop" and skip the sync silently. Listing fails loudly instead, and
      # only a successful listing that lacks `develop` counts as absent.
      #
      # It uses the PAT for the same reason every other call here does: the
      # workflow grants GITHUB_TOKEN no scopes at all.
      - name: Check whether develop exists
        id: develop
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          branches="$(gh api "repos/$REPO/branches" --paginate --jq '.[].name')"

          if printf '%s\n' "$branches" | grep -qx develop; then
            echo 'exists=true' >> "$GITHUB_OUTPUT"
          else
            echo 'exists=false' >> "$GITHUB_OUTPUT"
            echo "No develop branch; there is no candidate baseline to move."
          fi

      # The PAT is needed to push; `develop` is checked out directly because the
      # only edit is a one-line baseline rewrite that never conflicts.
      - name: Check out develop
        if: steps.develop.outputs.exists == 'true'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: develop
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}

      # The bump travels as a pull request, not a push: `develop` is covered by a
      # ruleset that requires one, so a direct push is rejected with GH013 and
      # fails the release run *after* the version has already been tagged and
      # published. Auto-merge is then asked for, because nothing else would merge
      # it and a develop left on a stale baseline silently keeps incrementing the
      # previous rc series.
      #
      # The branch is cut fresh from `origin/develop` rather than from the commit
      # this job checked out, since develop keeps moving while a release is being
      # cut. The baseline is absolute rather than a delta, so re-deriving it on
      # top of whatever landed meanwhile is always correct.
      - name: Propose the released version as the candidate baseline
        if: steps.develop.outputs.exists == 'true'
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          REPO: ${{ github.repository }}
          VERSION: ${{ needs.release-please.outputs.version }}
        run: |
          set -euo pipefail

          manifest=".release-please-manifest.develop.json"
          branch="chore/candidate-baseline-$VERSION"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git fetch --quiet origin develop
          git reset --quiet --hard origin/develop

          printf '{".":"%s"}\n' "$VERSION" > "$manifest"

          # Staged before the comparison: an unstaged `git diff` reports no change
          # for a file that is merely untracked, which would read as "already at
          # this version" if the manifest ever went missing from develop.
          git add "$manifest"

          if git diff --quiet --cached -- "$manifest"; then
            echo "The candidate baseline is already $VERSION; nothing to do."
            exit 0
          fi

          git checkout --quiet -B "$branch"
          git commit --quiet -m "chore: move the candidate baseline to $VERSION"

          # Forced because a re-run for the same version rewrites the same branch
          # on top of a develop that has moved; the branch is this job's alone.
          git push --quiet --force origin "$branch"

          # The baseline may only land on develop *after* the back-merge has, and
          # the two are queued in parallel — at 1.12.2 the baseline won that race
          # by 34 seconds. It names a version whose tag was cut on `master`, so
          # until master is contained in develop that tag is unreachable from the
          # candidate line: release-please then finds no release at all, falls back
          # to its initial 1.0.0, and proposes a downgrade (#637).
          #
          # So the merge is queued only once the comparison says develop already
          # contains master. The interval and attempt count are overridable so the
          # tests can drive the same loop without the clock; the defaults give the
          # back-merge half an hour, which is the full CI suite several times over.
          wait_for_containment() {
            local attempts="${CONTAINMENT_ATTEMPTS:-60}"

            while [ "$attempts" -gt 0 ]; do
              if [ "$(gh api "repos/$REPO/compare/develop...master" --jq '.ahead_by')" -eq 0 ]; then
                return 0
              fi

              sleep "${CONTAINMENT_INTERVAL:-30}"
              attempts=$((attempts - 1))
            done

            return 1
          }

          # A repository without auto-merge enabled must not fail a release that
          # has already been tagged and published — say so and move on. Asked for
          # on a reused PR too: the earlier run may have opened it at a point when
          # auto-merge could not be queued.
          #
          # A back-merge that never arrives is different: the proposal itself is
          # sound and stays open, but nothing may merge it yet, so the run goes red
          # rather than queueing it. The release is already tagged and published —
          # only this follow-up is unfinished, and it is finished by merging the
          # back-merge and then the PR this job left behind.
          queue_merge() {
            if ! wait_for_containment; then
              echo "::error::develop does not contain master yet, so the baseline PR must not merge; land the back-merge first, then merge it." >&2
              return 1
            fi

            gh pr merge --repo "$REPO" --auto --squash "$branch" \
              || echo "Could not queue the baseline PR to merge itself; merge it by hand."
          }

          existing="$(gh pr list --repo "$REPO" --base develop --head "$branch" --state open --json number --jq '.[0].number // empty')"

          if [ -n "$existing" ]; then
            echo "Baseline PR #$existing is already open; it now carries $VERSION."
            queue_merge
            exit 0
          fi

          gh pr create \
            --repo "$REPO" \
            --base develop \
            --head "$branch" \
            --title "chore: move the candidate baseline to $VERSION" \
            --body "$(cat <<'BODY'
          `master` has released a stable version, so the candidate line needs a new
          baseline: without this, `develop` keeps incrementing the rc series of the
          version that has already shipped instead of starting a fresh one.

          Opened automatically by the release run; it merges itself once the checks
          pass.
          BODY
          )"

          queue_merge

  # Ordinarily `master` only ever receives what `develop` already has, so there is
  # nothing to send back. A hotfix released straight from `master` breaks that:
  # the fix exists only there, and the next promotion — which carries an older
  # ancestor of the same files — silently reverts it. Production then breaks a
  # second time, for the same reason, with nothing pointing at the cause.
  #
  # So rather than trusting anyone to remember the back-merge during an incident,
  # every stable release proposes it. When develop already contains master (the
  # normal case, straight after a promotion) the job finds nothing to do and
  # costs nothing; after a hotfix it leaves an open PR that is hard to miss.
  backmerge:
    name: Merge the released master back into develop
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      # No checkout: the PR is opened from `master` itself, so GitHub keeps it in
      # step with the branch as it moves and there is no working copy to manage.
      # The branch listing is preferred over probing `branches/develop` for the
      # same reason as in the baseline sync — a direct probe answers 404 both when
      # the branch is absent and when the call was refused, so an API problem
      # would read as "no develop" and skip the back-merge silently.
      - name: Open a back-merge PR when develop is behind master
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          REPO: ${{ github.repository }}
          VERSION: ${{ needs.release-please.outputs.version }}
        run: |
          set -euo pipefail

          branches="$(gh api "repos/$REPO/branches" --paginate --jq '.[].name')"

          if ! printf '%s\n' "$branches" | grep -qx develop; then
            echo "No develop branch; there is nothing to back-merge into."
            exit 0
          fi

          ahead="$(gh api "repos/$REPO/compare/develop...master" --jq '.ahead_by')"

          if [ "$ahead" -eq 0 ]; then
            echo "develop already contains master; nothing to back-merge."
            exit 0
          fi

          # The body says never squash, but `develop` has to allow squashing — it
          # takes squashed feature PRs too — so the instruction protects nothing on
          # its own. Queuing the merge with `--merge` removes the choice: GitHub
          # merges it as a merge commit once the checks pass, and nobody is offered
          # the wrong button. A repository that cannot grant auto-merge must not
          # fail a release that has already been tagged and published, and a PR
          # reused from an earlier run is asked again — that run may have opened it
          # at a point when auto-merge could not yet be queued.
          queue_merge() {
            gh pr merge "$1" --repo "$REPO" --auto --merge \
              || echo "Could not queue the back-merge to merge itself; merge it by hand, with a merge commit."
          }

          existing="$(gh pr list --repo "$REPO" --base develop --head master --state open --json number --jq '.[0].number // empty')"

          if [ -n "$existing" ]; then
            echo "Back-merge PR #$existing is already open; it tracks master as it moves."
            queue_merge "$existing"
            exit 0
          fi

          # The URL `gh pr create` prints is what identifies the new PR to the
          # merge call. Re-querying for it instead would race the API's own
          # indexing, and a lookup that came back empty would leave the PR
          # silently unqueued.
          #
          # It can still lose a race to a human opening the back-merge by hand
          # between the lookup above and this call, which GitHub refuses. That is
          # not a broken release: the pull request exists, so find it and queue
          # that one instead of failing a run whose release has already shipped.
          if ! created="$(gh pr create \
            --repo "$REPO" \
            --base develop \
            --head master \
            --title "chore: merge master back into develop after $VERSION" \
            --body "$(cat <<'BODY'
          `master` carries commits `develop` does not — a hotfix released straight
          from the stable line. Merge this so the fix survives the next promotion:
          left alone, `develop` -> `master` would carry an older ancestor of the
          same files and silently revert it.

          **Merge this with a merge commit, never a squash.** The release run asks
          GitHub to merge it that way on its own; if that could not be arranged, do
          it by hand — and still with a merge commit. A squash would flatten
          `master`'s history into one new commit on `develop`, leaving the branches
          permanently diverged and every later back-merge conflicting.
          BODY
          )" | tail -n 1)"; then
            created="$(gh pr list --repo "$REPO" --base develop --head master --state open --json number --jq '.[0].number // empty')"

            if [ -z "$created" ]; then
              echo "Could not open the back-merge PR, and none is open." >&2
              exit 1
            fi

            echo "Back-merge PR #$created was opened while this run was preparing one."
          fi

          queue_merge "$created"
