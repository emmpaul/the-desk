name: tests

on:
  push:
    branches:
      - develop
      - main
      - master
      - workos
  pull_request:
    branches:
      - develop
      - main
      - master
      - workos

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Symfony 8 (Laravel 13) requires PHP >= 8.4, so 8.3 cannot install the locked deps.
        php-version: ['8.4', '8.5']

    # The schema relies on Postgres-only defaults (gen_random_uuid()), so tests
    # run against Postgres to match the local Sail environment.
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: testing
          POSTGRES_USER: laravel
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd=pg_isready
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DB_CONNECTION: pgsql
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_DATABASE: testing
      DB_USERNAME: laravel
      DB_PASSWORD: password

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: ${{ matrix.php-version }}
          tools: composer:v2
          coverage: xdebug

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'

      - name: Install Node Dependencies
        run: npm i

      - name: Install Dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Copy Environment File
        run: cp .env.example .env

      - name: Generate Application Key
        run: php artisan key:generate

      # `resources/js/generated/generated.d.ts` (the App.Data.* / App.Enums.*
      # ambient namespace) is a git-ignored build artifact, so a fresh checkout
      # lacks it — and the transformer requires its output directory to already
      # exist. Create it, then regenerate the types before the type check,
      # otherwise `vue-tsc` cannot resolve the `App` namespace pages now consume.
      - name: Generate TypeScript Types
        run: |
          mkdir -p resources/js/generated
          php artisan typescript:transform

      - name: Build Assets
        run: npm run build

      - name: Check Frontend Types
        run: npm run types:check

      - name: Run Type Analysis
        run: composer types:check

      - name: Tests
        run: php artisan test
