name: tests

on:
  push:
    branches:
      - develop
      - master
  pull_request:
    branches:
      - develop
      - master

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR) so we don't
# burn Actions minutes finishing runs whose results are already stale.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # We develop and ship on 8.5, so CI exercises 8.5 only to keep Actions
        # minutes down (see #260). 8.4 remains the supported composer floor via
        # composer.json's `require`; it's just no longer tested on every run.
        php-version: ['8.5']

    # The schema relies on Postgres-only defaults (gen_random_uuid()), so tests
    # run against Postgres to match the local Sail environment.
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: testing
          POSTGRES_USER: laravel
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd=pg_isready
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DB_CONNECTION: pgsql
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_DATABASE: testing
      DB_USERNAME: laravel
      DB_PASSWORD: password

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: gd, imagick
          tools: composer:v2
          # CI does not enforce the coverage gate — that stays local via
          # `composer test` (--min=100 with PCOV). Loading a coverage driver
          # here would only slow the suite down (see #582).
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'
          cache: 'npm'

      # `npm ci` (not `npm i`) so a lockfile that disagrees with package.json
      # fails here instead of silently passing and only breaking the Docker
      # image build minutes later (see #608).
      - name: Install Node Dependencies
        run: npm ci

      # Caches the Composer download cache keyed on composer.lock, so unchanged
      # dependency sets skip re-fetching packages on every run.
      - name: Install Dependencies
        uses: ramsey/composer-install@65e4f84970763564f46a70b8a54b90d033b3bdda # v4.0.0
        with:
          composer-options: '--optimize-autoloader'

      - name: Copy Environment File
        run: cp .env.example .env

      - name: Generate Application Key
        run: php artisan key:generate

      # `resources/js/generated/generated.d.ts` (the App.Data.* / App.Enums.*
      # ambient namespace) is a git-ignored build artifact, so a fresh checkout
      # lacks it — and the transformer requires its output directory to already
      # exist. Create it, then regenerate the types before the type check,
      # otherwise `vue-tsc` cannot resolve the `App` namespace pages now consume.
      - name: Generate TypeScript Types
        run: |
          mkdir -p resources/js/generated
          php artisan typescript:transform

      - name: Build Assets
        run: npm run build

      - name: Check Frontend Types
        run: npm run types:check

      - name: Run Type Analysis
        run: composer types:check

      # Parallel Pest (paratest): Laravel provisions one `testing_{n}` Postgres
      # database per worker automatically — the `laravel` service user owns the
      # server, so CREATE DATABASE works out of the box. The split of the ci job
      # into per-stage jobs proposed in #582 was measured and declined: Tests
      # dominate the job (~6 of ~7.5 min) while build/vue-tsc/PHPStan take
      # seconds each, so extra per-job setup would cost more than it saves.
      - name: Tests
        run: php artisan test --parallel

  # Browser (E2E) realtime suite: drives real Playwright browsers against the
  # app served in-process, with a live Reverb server so two clients exchange
  # broadcasts over WebSockets. Kept as a separate job (no coverage/xdebug) so it
  # never folds into the 100% coverage gate above — the `browser` group is
  # excluded from phpunit's default suites and only runs via `pest tests/Browser`.
  browser:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: testing
          POSTGRES_USER: laravel
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd=pg_isready
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DB_CONNECTION: pgsql
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_DATABASE: testing
      DB_USERNAME: laravel
      DB_PASSWORD: password
      # Both the Reverb server and the in-process app run on this one runner, so a
      # single 127.0.0.1 host reaches Reverb from the PHP publisher and from the
      # browser client alike. The browser suite derives its public host/port/scheme
      # from these same options (see useReverbForBrowserTests). Credentials are
      # arbitrary but must match on both sides — they do, sharing this env.
      REVERB_APP_ID: 'ci-app'
      REVERB_APP_KEY: 'ci-app-key'
      REVERB_APP_SECRET: 'ci-app-secret'
      REVERB_HOST: '127.0.0.1'
      REVERB_PORT: 8080
      REVERB_SCHEME: http
      # Bind the Reverb server itself to the same loopback host/port the app and
      # browser connect to.
      REVERB_SERVER_HOST: '127.0.0.1'
      REVERB_SERVER_PORT: 8080

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: '8.5'
          extensions: gd, imagick
          tools: composer:v2

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Node Dependencies
        run: npm ci

      - name: Install Dependencies
        uses: ramsey/composer-install@65e4f84970763564f46a70b8a54b90d033b3bdda # v4.0.0
        with:
          composer-options: '--optimize-autoloader'

      - name: Install Playwright Browser
        run: npx playwright install --with-deps chromium

      - name: Copy Environment File
        run: cp .env.example .env

      - name: Generate Application Key
        run: php artisan key:generate

      # Regenerate the git-ignored App.Data.* / App.Enums.* ambient types (see the
      # ci job above) so the Vite build can resolve the `App` namespace.
      - name: Generate TypeScript Types
        run: |
          mkdir -p resources/js/generated
          php artisan typescript:transform

      - name: Build Assets
        run: npm run build

      # Start Reverb in the background and wait for it to accept connections before
      # the browser suite subscribes any client.
      - name: Start Reverb
        run: |
          php artisan reverb:start --host=127.0.0.1 --port=8080 &
          for i in $(seq 1 30); do
            if nc -z 127.0.0.1 8080; then
              echo "Reverb is up"
              exit 0
            fi
            sleep 1
          done
          echo "Reverb failed to start" >&2
          exit 1

      - name: Run Browser Tests
        run: ./vendor/bin/pest tests/Browser --ci
