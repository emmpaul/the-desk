name: tests

on:
  push:
    branches:
      - develop
      - master
  pull_request:
    branches:
      - develop
      - master

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR) so we don't
# burn Actions minutes finishing runs whose results are already stale.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # We develop and ship on 8.5, so CI exercises 8.5 only to keep Actions
        # minutes down (see #260). 8.4 remains the supported composer floor via
        # composer.json's `require`; it's just no longer tested on every run.
        php-version: ['8.5']

    # The schema relies on Postgres-only defaults (gen_random_uuid()), so tests
    # run against Postgres to match the local Sail environment.
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: testing
          POSTGRES_USER: laravel
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd=pg_isready
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DB_CONNECTION: pgsql
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_DATABASE: testing
      DB_USERNAME: laravel
      DB_PASSWORD: password

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: ${{ matrix.php-version }}
          tools: composer:v2
          coverage: xdebug

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Node Dependencies
        run: npm i

      # Caches the Composer download cache keyed on composer.lock, so unchanged
      # dependency sets skip re-fetching packages on every run.
      - name: Install Dependencies
        uses: ramsey/composer-install@a8d0d959dab41457692a5e2041bd9b757a119e3f # v3.2.1
        with:
          composer-options: '--optimize-autoloader'

      - name: Copy Environment File
        run: cp .env.example .env

      - name: Generate Application Key
        run: php artisan key:generate

      # `resources/js/generated/generated.d.ts` (the App.Data.* / App.Enums.*
      # ambient namespace) is a git-ignored build artifact, so a fresh checkout
      # lacks it — and the transformer requires its output directory to already
      # exist. Create it, then regenerate the types before the type check,
      # otherwise `vue-tsc` cannot resolve the `App` namespace pages now consume.
      - name: Generate TypeScript Types
        run: |
          mkdir -p resources/js/generated
          php artisan typescript:transform

      - name: Build Assets
        run: npm run build

      - name: Check Frontend Types
        run: npm run types:check

      - name: Run Type Analysis
        run: composer types:check

      - name: Tests
        run: php artisan test
