version: 2
updates:
  - package-ecosystem: "github-actions"
    # `/` covers `.github/workflows` plus an `action.yml` at the repository
    # root — and nothing else, so a composite action in a subdirectory is
    # invisible to dependabot until its own directory is listed. These two do
    # not overlap for that reason. The Docker build actions live in such a
    # composite action because `uses:` cannot be templated with the runner
    # variable (see CONTRIBUTING.md → CI runners).
    directories:
      - "/"
      - "/.github/actions/docker-build"
    # `develop` is the line every ordinary change goes through; `master` only
    # takes promotions from it. Without this, dependabot opens against the
    # repository's default branch — `master` — and the bump ships without ever
    # being exercised on a release candidate. Note that dependabot reads this
    # file from the default branch only, so the setting takes effect once this
    # change has been promoted to `master`, and *security* updates ignore it.
    target-branch: "develop"
    schedule:
      interval: "weekly"
    # `deps` is our changelog type for dependency bumps: release-please folds it
    # into the release's Dependencies section, and it satisfies commitlint's
    # type-enum. Without a prefix, dependabot's default subjects aren't
    # Conventional Commits and would fail the commitlint check.
    commit-message:
      prefix: "deps"
    cooldown:
      default-days: 5
    groups:
      github-actions:
        patterns:
          - "*"
