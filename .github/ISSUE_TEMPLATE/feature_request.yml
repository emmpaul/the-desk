name: Feature request
description: Suggest a new capability or an improvement.
title: "feat: "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea! Describe the problem first — what you're trying to
        do — so the solution can be discussed on its merits.
  - type: checkboxes
    id: preflight
    attributes:
      label: Before you start
      options:
        - label: I searched [existing issues](https://github.com/emmpaul/the-desk/issues?q=is%3Aissue) and this isn't already requested.
          required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What are you trying to do, and what's getting in the way today?
      placeholder: As a workspace admin, I want … so that …
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What you'd like to happen. Rough is fine.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches or workarounds you've thought about.
    validations:
      required: false
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: How would we know this is done? A short checklist helps.
      placeholder: |
        - [ ] …
        - [ ] …
    validations:
      required: false
