# Production stack for self-hosting. This file carries no version — the release
# to run lives in .env as APP_VERSION, so upgrading is an .env edit plus a pull,
# with no git checkout and no repository on the server at all:
#
#   curl -fsSL https://raw.githubusercontent.com/deskhq/the-desk/master/docker/install.sh | sh
#   # edit .env (APP_URL, mail, REVERB_*_PUBLIC), then:
#   docker compose up -d             # pulls the pinned image, no build
#
# APP_VERSION is required and has no default: a bare `up -d` with it unset fails
# fast with a clear message rather than silently pulling some other version.
#
# The bare `docker compose` above is not a typo: .env.prod.example ships
# COMPOSE_FILE=docker-compose.prod.yml, so the CLI resolves this file with no
# `-f`. Without it a bare command would pick up compose.yaml, the Sail dev stack.
#
# To build the app image from source instead, layer the build overlay on top by
# listing both files in COMPOSE_FILE:
#   COMPOSE_FILE=docker-compose.prod.yml:docker-compose.build.yml
#   docker compose up -d --build
#
# Development uses Laravel Sail (compose.yaml) — this file does not replace it.
#
# TLS/HTTPS is the operator's responsibility: put a reverse proxy in front of
# `app` and `reverb`. The proxy must forward WebSocket upgrade requests to the
# reverb service.
#
# Both services speak PLAIN HTTP, so their host port publishing defaults to
# loopback (APP_BIND=127.0.0.1) on non-privileged ports — the unencrypted origin
# is never exposed to the public internet, and nothing squats on 80/443:
#   - A host-based proxy targets 127.0.0.1:${APP_PORT} and 127.0.0.1:${REVERB_PORT}.
#   - A proxy running inside this compose network reaches app:8080 / reverb:8080
#     directly and needs no host publishing at all.
# Set APP_BIND=0.0.0.0 only to deliberately expose the raw HTTP app off-box.
#
# Redis backs cache, session, and queue (SESSION_DRIVER/CACHE_STORE=redis,
# QUEUE_CONNECTION=redis in .env, with REDIS_HOST=redis). Broadcasting uses
# Reverb. The `redis` service below is always-on; every app process depends on
# it being healthy before it starts.

# The infrastructure every app-role service waits for. Split out of the *app
# anchor so `queue`, `reverb`, and `scheduler` can add `app` to their own
# `depends_on` without restating these three: a service that declares
# `depends_on` replaces the anchor's value wholesale, it does not merge into it.
x-infra-depends-on: &infra-depends-on
  pgsql:
    condition: service_healthy
  redis:
    condition: service_healthy
  meilisearch:
    condition: service_healthy

# What the three worker services wait for: the infrastructure above, plus `app`.
#
# The four app-role services share the `storage-app` named volume. On a fresh
# volume (a first install, or any `up -d` after `down -v`) the daemon seeds it
# from the image's /app/storage/app — `private/` and `public/`. Four containers
# created at the same instant all trigger that copy-up, race inside dockerd, and
# one dies with `mkdir /var/lib/docker/volumes/…/_data/private: file exists`
# (#609). Waiting on `app` means exactly one container ever seeds the volume.
#
# `service_started`, not `service_healthy`: the copy-up is done once the app
# container is created and started, and the workers have no reason to sit
# through app's migrations and HTTP start_period before picking up jobs.
x-worker-depends-on: &worker-depends-on
  <<: *infra-depends-on
  app:
    condition: service_started

x-app: &app
  # Runs the prebuilt turnkey image from the GitHub Container Registry — `up -d`
  # pulls it, no build step. APP_VERSION (in .env) selects the tag, so upgrading
  # is an APP_VERSION bump, not a git checkout. It is required and has no default:
  # the `:?` guard fails a bare `up -d` with a clear message if it is unset, which
  # is deliberate — a silent default would have to be stamped here and would put
  # the version back into this file. Browser Reverb settings are read at runtime,
  # so one published image works for any host.
  #
  # APP_IMAGE still overrides the whole reference when set, for a tag on another
  # registry (a fork, an air-gapped mirror) or `edge`; then APP_VERSION is unused.
  #
  # To build from source instead, add the build overlay (docker-compose.build.yml)
  # which restores a local build for these services (APP_VERSION then just tags
  # the locally built image):
  #   COMPOSE_FILE=docker-compose.prod.yml:docker-compose.build.yml   # in .env
  #   docker compose up -d --build
  image: ${APP_IMAGE:-ghcr.io/deskhq/the-desk:${APP_VERSION:?APP_VERSION is required — set it in .env (see .env.prod.example) or override APP_IMAGE}}
  env_file:
    - .env
  restart: unless-stopped
  volumes:
    # `env_file` injects the variables into the container's environment, but also
    # bind-mount the file itself so the physical `.env` is on disk inside the app.
    # Artisan commands run against the container (e.g. `demo:seed`, maintenance)
    # then resolve configuration exactly like a standard on-disk install, even
    # when the boot-time config cache has been cleared. Read-only: the operator
    # owns and edits the file on the host.
    - ./.env:/app/.env:ro
    - storage-app:/app/storage/app
  depends_on: *infra-depends-on
  networks:
    - app

services:
  # Web app (FrankenPHP). Runs migrations on start and serves HTTP on 8080.
  app:
    <<: *app
    environment:
      AUTORUN_MIGRATIONS: 'true'
    ports:
      - '${APP_BIND:-127.0.0.1}:${APP_PORT:-8000}:8080'
    healthcheck:
      test: ['CMD', 'curl', '-fsS', 'http://localhost:8080/up']
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s

  # WebSocket server for broadcasting. Reverb serves a health endpoint at
  # GET /up on the same 8080 port, so it gets a real probe (unlike queue and
  # scheduler, which have no HTTP surface).
  reverb:
    <<: *app
    command: ['php', 'artisan', 'reverb:start', '--host=0.0.0.0', '--port=8080']
    depends_on: *worker-depends-on
    ports:
      - '${APP_BIND:-127.0.0.1}:${REVERB_PORT:-8080}:8080'
    healthcheck:
      test: ['CMD', 'curl', '-fsS', 'http://localhost:8080/up']
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Queue worker (queue connection is `redis`). No HTTP surface, so no
  # healthcheck: the image sets HEALTHCHECK NONE and this service leaves it that
  # way, reporting a plain `Up` rather than a decorative or perpetually failing
  # probe. `restart: unless-stopped` (from the *app anchor) keeps it running.
  queue:
    <<: *app
    command: ['php', 'artisan', 'queue:work', '--tries=3']
    depends_on: *worker-depends-on

  # Scheduler (delivers due scheduled messages, prunes expired invitations).
  # Also no HTTP surface — same no-healthcheck rationale as `queue` above.
  scheduler:
    <<: *app
    command: ['php', 'artisan', 'schedule:work']
    depends_on: *worker-depends-on

  pgsql:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: ${DB_DATABASE:-laravel}
      POSTGRES_USER: ${DB_USERNAME:-laravel}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      # Postgres 18+ stores data in a major-version subdirectory and expects the
      # mount at /var/lib/postgresql (not /var/lib/postgresql/data, the pre-18
      # path); mounting the old path makes the container refuse to start.
      - pgsql-data:/var/lib/postgresql
    restart: unless-stopped
    networks:
      - app
    healthcheck:
      test: ['CMD', 'pg_isready', '-q', '-d', '${DB_DATABASE:-laravel}', '-U', '${DB_USERNAME:-laravel}']
      interval: 10s
      timeout: 5s
      retries: 5

  meilisearch:
    # Meilisearch's on-disk format is version-specific and it will refuse to
    # boot against a data directory written by a different version. MEILISEARCH_VERSION
    # pins both the image tag and the data volume name (see `volumes` below), so
    # bumping it starts the new version against a fresh volume; the app then
    # rebuilds the index from Postgres on boot (`php artisan search:sync`). No
    # dump-based migration is needed — the search index is derived data.
    image: getmeili/meilisearch:${MEILISEARCH_VERSION:-v1.49}
    environment:
      MEILI_MASTER_KEY: ${MEILISEARCH_KEY:?MEILISEARCH_KEY is required}
      MEILI_ENV: production
      MEILI_NO_ANALYTICS: ${MEILISEARCH_NO_ANALYTICS:-true}
    volumes:
      - meili-data:/meili_data
    restart: unless-stopped
    networks:
      - app
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--spider', 'http://127.0.0.1:7700/health']
      interval: 10s
      timeout: 5s
      retries: 5

  # Backs cache, session, and queue (see the app env drivers above). Persists to
  # a named volume so queued jobs survive a restart; `appendonly` keeps the AOF
  # log for durability between snapshots.
  redis:
    image: redis:alpine
    command: ['redis-server', '--appendonly', 'yes']
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - app
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  app:
    driver: bridge

volumes:
  pgsql-data:
  meili-data:
    # Version-scoped so a MEILISEARCH_VERSION bump lands on a new empty volume and
    # the new Meilisearch boots cleanly. The previous version's volume is left
    # behind for manual pruning (`docker volume rm the-desk-meili-<old>`).
    name: the-desk-meili-${MEILISEARCH_VERSION:-v1.49}
  redis-data:
  storage-app:
